<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PythBots</title>
        <style>
            :root {
                --bg-main: #050a6b;
                --bg-dark: #03054a;
                --grid-blue: rgba(33, 116, 255, 0.28);
                --grid-pink: rgba(255, 40, 130, 0.18);
                --line-blue: rgba(0, 119, 255, 0.8);
                --line-pink: rgba(255, 34, 110, 0.55);
                --glow-blue: rgba(117, 167, 255, 0.95);
                --glow-pink: rgba(255, 67, 131, 0.95);
                --logo-bg-1: rgba(160, 195, 255, 0.18);
                --logo-bg-2: rgba(255, 255, 255, 0.05);
                --logo-border: rgba(255, 255, 255, 0.92);
                --logo-text: #eef4ff;
                --brand-main: #ff264f;
                --brand-accent: #ff2f9d;
                --brand-outline: rgba(255, 43, 98, 0.8);
                --scanline: rgba(255, 255, 255, 0.03);

                --left-logo-line-1: "PYTH";
                --left-logo-line-2: "BOTS";
                --right-tag-small: "XAT";
                --right-tag-large: "PYTHBOTS";

                --chat-safe-right-start: 1180px;
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background:
                    radial-gradient(
                        circle at 70% 45%,
                        rgba(120, 0, 120, 0.18),
                        transparent 30%
                    ),
                    linear-gradient(135deg, var(--bg-main), var(--bg-dark));
                font-family: Arial, Helvetica, sans-serif;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: repeating-linear-gradient(
                    to bottom,
                    transparent 0px,
                    transparent 4px,
                    var(--scanline) 5px
                );
                pointer-events: none;
                opacity: 0.35;
                mix-blend-mode: screen;
            }

            .scene {
                position: relative;
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                background:
                    linear-gradient(
                        to right,
                        transparent 0%,
                        rgba(37, 0, 95, 0.15) 78%,
                        rgba(255, 0, 98, 0.08) 100%
                    ),
                    linear-gradient(
                        135deg,
                        #07117b 0%,
                        #02074d 60%,
                        #16003b 100%
                    );
            }

            .grid {
                position: absolute;
                inset: 0;
                background-image:
                    linear-gradient(
                        to right,
                        var(--grid-blue) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        to bottom,
                        var(--grid-blue) 1px,
                        transparent 1px
                    );
                background-size: 90px 90px;
                opacity: 0.75;
                transform: perspective(1200px) rotateX(0deg) scale(1.1);
                animation: gridPulse 7s ease-in-out infinite;
            }

            .grid::after {
                content: "";
                position: absolute;
                inset: 0;
                background-image:
                    linear-gradient(
                        to right,
                        var(--grid-pink) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        to bottom,
                        var(--grid-pink) 1px,
                        transparent 1px
                    );
                background-size: 180px 180px;
                opacity: 0.45;
                mix-blend-mode: screen;
            }

            .rain,
            .rain::before,
            .rain::after {
                position: absolute;
                inset: 0;
                content: "";
                background-image:
                    linear-gradient(
                        to bottom,
                        transparent,
                        rgba(36, 130, 255, 0.8),
                        transparent
                    ),
                    linear-gradient(
                        to bottom,
                        transparent,
                        rgba(255, 48, 124, 0.72),
                        transparent
                    ),
                    linear-gradient(
                        to bottom,
                        transparent,
                        rgba(53, 112, 255, 0.55),
                        transparent
                    ),
                    linear-gradient(
                        to bottom,
                        transparent,
                        rgba(255, 48, 124, 0.4),
                        transparent
                    );
                background-repeat: repeat-x;
                background-size:
                    2px 180px,
                    2px 240px,
                    1px 140px,
                    1px 220px;
                background-position:
                    5% -20%,
                    28% 15%,
                    63% -10%,
                    92% 5%;
                opacity: 0.34;
                animation: rainMove 10s linear infinite;
                pointer-events: none;
            }

            .rain::before {
                opacity: 0.24;
                filter: blur(0.4px);
                animation-duration: 14s;
                background-position:
                    15% 0%,
                    44% 20%,
                    75% 10%,
                    87% 0%;
            }

            .rain::after {
                opacity: 0.18;
                animation-duration: 18s;
                background-position:
                    10% 15%,
                    36% 2%,
                    58% 12%,
                    80% 5%;
            }

            .circuit {
                position: absolute;
                inset: 0;
                pointer-events: none;
            }

            .circuit svg {
                width: 100%;
                height: 100%;
                display: block;
            }

            .path-blue,
            .path-pink,
            .path-soft {
                fill: none;
                stroke-linecap: round;
                stroke-linejoin: round;
                vector-effect: non-scaling-stroke;
            }

            .path-blue {
                stroke: var(--line-blue);
                stroke-width: 3;
                filter: drop-shadow(0 0 6px rgba(50, 130, 255, 0.65));
                stroke-dasharray: 16 12;
                animation: dashMove 22s linear infinite;
            }

            .path-pink {
                stroke: var(--line-pink);
                stroke-width: 3;
                filter: drop-shadow(0 0 8px rgba(255, 55, 140, 0.45));
                stroke-dasharray: 22 16;
                animation: dashMoveReverse 19s linear infinite;
            }

            .path-soft {
                stroke: rgba(93, 103, 255, 0.28);
                stroke-width: 2;
            }

            .hud-dots circle,
            .hud-bars rect,
            .hud-boxes rect {
                animation: hudBlink 2.8s ease-in-out infinite;
            }

            .hud-bars rect:nth-child(2) { animation-delay: 0.2s; }
            .hud-bars rect:nth-child(3) { animation-delay: 0.4s; }
            .hud-bars rect:nth-child(4) { animation-delay: 0.6s; }
            .hud-bars rect:nth-child(5) { animation-delay: 0.8s; }

            .streak {
                position: absolute;
                height: 10px;
                border-radius: 999px;
                filter: blur(1.5px);
                opacity: 0.55;
                animation: streakMove 5s linear infinite;
            }

            .streak.blue {
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(51, 128, 255, 0.25),
                    rgba(51, 128, 255, 0.95),
                    transparent
                );
            }

            .streak.pink {
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 45, 120, 0.18),
                    rgba(255, 45, 120, 0.9),
                    transparent
                );
            }

            .logo-card {
                position: absolute;
                left: 6.2%;
                top: 46%;
                transform: translateY(-50%);
                width: 250px;
                height: 190px;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 5;
                animation: floatBox 5.5s ease-in-out infinite;
            }

            .logo-frame,
            .logo-frame::before,
            .logo-frame::after {
                clip-path: polygon(
                    12% 0%,
                    88% 0%,
                    100% 14%,
                    100% 86%,
                    88% 100%,
                    12% 100%,
                    0% 86%,
                    0% 14%
                );
            }

            .logo-frame {
                position: relative;
                width: 100%;
                height: 100%;
                border: 4px solid var(--logo-border);
                background: linear-gradient(
                    180deg,
                    var(--logo-bg-1),
                    var(--logo-bg-2)
                );
                box-shadow:
                    0 0 20px rgba(160, 190, 255, 0.32),
                    0 0 38px rgba(145, 183, 255, 0.18),
                    inset 0 0 22px rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(6px);
            }

            .logo-frame::before {
                content: "";
                position: absolute;
                inset: 10px;
                border: 2px solid rgba(255, 255, 255, 0.78);
                opacity: 0.85;
            }

            .logo-frame::after {
                content: "";
                position: absolute;
                inset: -13px;
                border: 2px solid rgba(255, 255, 255, 0.9);
                opacity: 0.92;
                pointer-events: none;
            }

            .corner-node {
                position: absolute;
                width: 11px;
                height: 11px;
                background: #fff;
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
                z-index: 2;
            }

            .n1 { top: -6px; left: 28px; }
            .n2 { top: -6px; left: 50px; }
            .n3 { top: -6px; left: 72px; }
            .n4 { right: -6px; bottom: 22px; }
            .n5 { right: 18px; bottom: -6px; }
            .n6 { right: 40px; bottom: -6px; }

            .logo-text {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 3;
                text-align: center;
                color: var(--logo-text);
                font-weight: 900;
                line-height: 0.9;
                letter-spacing: 2px;
                text-shadow:
                    0 0 7px rgba(255, 255, 255, 0.75),
                    0 0 18px rgba(166, 197, 255, 0.9),
                    0 0 28px rgba(121, 161, 255, 0.55);
                user-select: text;
            }

            .logo-text .line1,
            .logo-text .line2 {
                display: block;
                font-size: 4rem;
            }

            .logo-text .line1::before { content: var(--left-logo-line-1); }
            .logo-text .line2::before { content: var(--left-logo-line-2); }

            .right-stack {
                position: absolute;
                top: clamp(180px, 26vh, 300px);
                right: clamp(16px, 2.8vw, 56px);
                width: clamp(220px, 18vw, 330px);
                max-width: 330px;
                z-index: 9;
                display: flex;
                flex-direction: column;
                gap: 14px;
                align-items: stretch;
            }

            .right-stack > * { width: 100%; }

            @media (max-width: 1510px) {
                .right-stack { width: clamp(200px, 16vw, 280px); }
            }

            @media (max-width: 1400px) {
                .right-stack { width: 240px; }
                .release-name { font-size: 20px; }
            }

            @media (max-width: 1330px) {
                .right-stack { display: none; }
            }

            /* Smiley slideshow panel */
            .smiley-slideshow {
                border-radius: 18px;
                padding: 0 16px;
                background: linear-gradient(180deg, rgba(12,24,92,0.86), rgba(6,12,45,0.9));
                border: 1px solid rgba(255,255,255,0.12);
                box-shadow: 0 22px 50px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.06);
                backdrop-filter: blur(12px);
                color: #eef4ff;
                overflow: hidden;
                max-height: 0;
                opacity: 0;
                transform: translateY(12px);
                transition:
                    max-height 0.5s cubic-bezier(0.4,0,0.2,1),
                    opacity 0.4s ease,
                    padding 0.4s ease,
                    transform 0.4s ease;
                pointer-events: none;
            }

            .smiley-slideshow.ss-show {
                max-height: 200px;
                opacity: 1;
                padding-top: 14px;
                padding-bottom: 14px;
                transform: translateY(0);
                pointer-events: auto;
            }

            .ss-title {
                font-size: 11px;
                font-weight: 800;
                letter-spacing: 1px;
                text-transform: uppercase;
                color: rgba(228,236,255,0.75);
                margin-bottom: 10px;
            }

            .ss-stage {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                min-height: 100px;
                justify-content: center;
            }

            .ss-img {
                width: 80px;
                height: 80px;
                object-fit: contain;
                filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
                transition: opacity 0.3s ease, transform 0.3s ease;
            }

            .ss-img.ss-fx-out { opacity: 0; transform: translateX(-18px); }
            .ss-img.ss-fx-in  { opacity: 1; transform: translateX(0); }

            .ss-label {
                font-size: 12px;
                font-weight: 700;
                color: rgba(200,220,255,0.9);
                letter-spacing: 0.5px;
                transition: opacity 0.3s ease;
            }

            .ss-label.ss-fx-out { opacity: 0; }
            .ss-label.ss-fx-in  { opacity: 1; }

            .ss-dots {
                display: flex;
                gap: 5px;
                justify-content: center;
                margin-top: 8px;
            }

            .ss-dot {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: rgba(255,255,255,0.22);
                transition: background 0.3s ease;
            }

            .ss-dot.active { background: rgba(255,255,255,0.88); }

            .release-power-display {
                min-height: auto;
                border-radius: 18px;
                padding: 16px;
                background: linear-gradient(
                    180deg,
                    rgba(12, 24, 92, 0.86),
                    rgba(6, 12, 45, 0.9)
                );
                border: 1px solid rgba(255, 255, 255, 0.12);
                box-shadow:
                    0 22px 50px rgba(0, 0, 0, 0.32),
                    inset 0 1px 0 rgba(255, 255, 255, 0.06);
                backdrop-filter: blur(12px);
                color: #eef4ff;
                opacity: 0;
                visibility: hidden;
                transform: translateY(10px) scale(0.98);
                transition:
                    opacity 0.22s ease,
                    transform 0.22s ease,
                    visibility 0.22s ease;
            }

            .release-power-display.show {
                opacity: 1;
                visibility: visible;
                transform: translateY(0) scale(1);
            }

            .release-title {
                font-size: 12px;
                font-weight: 800;
                letter-spacing: 1px;
                text-transform: uppercase;
                color: rgba(228, 236, 255, 0.94);
                margin-bottom: 12px;
            }

            .release-body.loading,
            .release-body.error {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100px;
                text-align: center;
                font-size: 13px;
                color: rgba(220, 230, 255, 0.8);
            }

            .release-card {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .release-image-wrap {
                width: 72px;
                height: 72px;
                border-radius: 16px;
                background: radial-gradient(
                    circle at 35% 30%,
                    rgba(255, 255, 255, 0.18),
                    rgba(255, 255, 255, 0.03)
                );
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid rgba(255, 255, 255, 0.08);
                flex: 0 0 72px;
            }

            .release-image {
                width: 50px;
                height: 50px;
                object-fit: contain;
                filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.35));
            }

            .release-info {
                min-width: 0;
                flex: 1;
            }

            .release-name {
                font-size: 24px;
                font-weight: 800;
                line-height: 0.95;
                color: #f2f7ff;
                margin: 0 0 8px;
                text-shadow: 0 0 14px rgba(170, 205, 255, 0.2);
                word-break: break-word;
            }

            .release-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                padding: 7px 0;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                font-size: 12px;
            }

            .release-row:first-of-type { border-top: 0; }

            .release-label { color: rgba(201, 216, 255, 0.72); }

            .release-value {
                color: #f2f7ff;
                font-weight: 700;
                text-align: right;
                white-space: nowrap;
            }

            .release-desc {
                margin-top: 10px;
                padding-top: 10px;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                font-size: 12px;
                line-height: 1.45;
                color: rgba(218, 228, 255, 0.78);
            }

            .brand-tag {
                position: relative;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                align-self: center;
                gap: 12px;
                padding: 10px 18px;
                min-height: 38px;
                border: 1.5px solid var(--brand-outline);
                border-radius: 999px;
                background: linear-gradient(
                    90deg,
                    rgba(18, 5, 70, 0.15),
                    rgba(255, 55, 130, 0.05)
                );
                box-shadow:
                    0 0 16px rgba(255, 40, 100, 0.18),
                    inset 0 0 18px rgba(255, 58, 130, 0.05);
                z-index: 5;
                animation: brandPulse 3.2s ease-in-out infinite;
            }

            .brand-small,
            .brand-large {
                color: var(--brand-main);
                font-weight: 900;
                line-height: 1;
                letter-spacing: 1px;
                text-shadow: 0 0 10px rgba(255, 47, 97, 0.35);
                user-select: text;
                white-space: nowrap;
            }

            .brand-small { font-size: 1rem; }
            .brand-large { font-size: 1.2rem; }
            .brand-small::before { content: var(--right-tag-small); }
            .brand-large::before { content: var(--right-tag-large); }

            .brand-arrow {
                position: relative;
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: radial-gradient(circle at 30% 30%, #ff548f, #f31f47);
                box-shadow: 0 0 16px rgba(255, 50, 96, 0.42);
                flex: 0 0 32px;
            }

            .brand-arrow::before {
                content: "";
                position: absolute;
                left: 50%;
                top: 50%;
                width: 8px;
                height: 8px;
                border-right: 4px solid white;
                border-bottom: 4px solid white;
                transform: translate(-60%, -50%) rotate(-45deg);
            }

            .top-bands {
                position: absolute;
                left: 0;
                top: 3.8%;
                width: 320px;
                height: 60px;
                pointer-events: none;
                opacity: 0.7;
            }

            .top-bands span {
                display: block;
                height: 5px;
                margin: 8px 0;
                background: linear-gradient(
                    90deg,
                    rgba(255, 48, 112, 0.96),
                    rgba(255, 48, 112, 0.18),
                    transparent 88%
                );
                filter: blur(1px);
                animation: bandSlide 4.8s linear infinite;
            }

            .top-bands span:nth-child(2) { width: 80%; animation-delay: 0.35s; }
            .top-bands span:nth-child(3) { width: 62%; animation-delay: 0.65s; }

            .edit-note {
                position: relative;
                z-index: 10;
                padding: 10px 14px;
                border-radius: 12px;
                background: rgba(7, 12, 60, 0.78);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: rgba(255, 255, 255, 0.88);
                font-size: 12px;
                letter-spacing: 0.3px;
                backdrop-filter: blur(6px);
                transition:
                    opacity 0.35s ease,
                    transform 0.35s ease;
                width: 100%;
                line-height: 1.45;
                overflow-wrap: anywhere;
            }

            .edit-note.tip-fade-out {
                opacity: 0;
                transform: translateY(6px);
            }

            .edit-note.tip-fade-in {
                opacity: 1;
                transform: translateY(0);
            }

            @keyframes gridPulse {
                0%, 100% { opacity: 0.72; transform: scale(1.1); }
                50% { opacity: 0.92; transform: scale(1.12); }
            }

            @keyframes dashMove {
                from { stroke-dashoffset: 0; }
                to { stroke-dashoffset: -420; }
            }

            @keyframes dashMoveReverse {
                from { stroke-dashoffset: 0; }
                to { stroke-dashoffset: 380; }
            }

            @keyframes rainMove {
                from { transform: translateY(-30px); }
                to { transform: translateY(60px); }
            }

            @keyframes streakMove {
                0% { transform: translateX(-10px); opacity: 0; }
                10% { opacity: 0.65; }
                100% { transform: translateX(110px); opacity: 0; }
            }

            @keyframes floatBox {
                0%, 100% { transform: translateY(-50%) translateX(0); }
                50% { transform: translateY(calc(-50% - 8px)) translateX(2px); }
            }

            @keyframes brandPulse {
                0%, 100% {
                    box-shadow:
                        0 0 12px rgba(255, 40, 100, 0.18),
                        inset 0 0 18px rgba(255, 58, 130, 0.05);
                }
                50% {
                    box-shadow:
                        0 0 20px rgba(255, 40, 100, 0.28),
                        inset 0 0 26px rgba(255, 58, 130, 0.08);
                }
            }

            @keyframes hudBlink {
                0%, 100% { opacity: 0.35; }
                50% { opacity: 1; }
            }

            @keyframes bandSlide {
                0% { transform: translateX(-18px); opacity: 0.35; }
                50% { opacity: 0.9; }
                100% { transform: translateX(26px); opacity: 0.2; }
            }

            @media (max-width: 900px) {
                .logo-card { width: 200px; height: 150px; }
                .logo-text .line1, .logo-text .line2 { font-size: 3.2rem; }
            }

            @media (max-width: 720px) {
                .logo-card {
                    left: 50%;
                    top: 31%;
                    transform: translate(-50%, -50%);
                    width: 180px;
                    height: 135px;
                }
                .logo-text .line1, .logo-text .line2 { font-size: 2.8rem; }
                .right-stack { display: none; }

                @keyframes floatBox {
                    0%, 100% { transform: translate(-50%, -50%) translateX(0); }
                    50% { transform: translate(-50%, calc(-50% - 8px)) translateX(2px); }
                }
            }
        </style>
    </head>
    <body>
        <div class="scene">
            <div class="grid"></div>
            <div class="rain"></div>

            <div class="top-bands">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="circuit">
                <svg viewBox="0 0 1920 1080" preserveAspectRatio="none" aria-hidden="true">
                    <path class="path-blue" d="M 500 300 L 720 300 L 830 420 L 1240 420 L 1240 250 L 1540 250" />
                    <path class="path-blue" d="M 430 560 L 730 560 L 860 680 L 1290 680 L 1290 810 L 1770 810" />
                    <path class="path-blue" d="M 515 220 L 610 220 L 610 160 L 1120 160" />
                    <path class="path-blue" d="M 0 870 L 750 870 L 975 1030" />

                    <path class="path-pink" d="M 880 330 L 1140 330 L 1320 650 L 1525 650 L 1635 790 L 1920 790" />
                    <path class="path-pink" d="M 820 900 L 1020 900 L 1160 930" />
                    <path class="path-pink" d="M 1400 500 L 1920 500" />

                    <path class="path-soft" d="M 760 160 L 980 160 L 1250 500 L 1550 500" />
                    <path class="path-soft" d="M 770 430 L 910 430 L 1030 560 L 1420 560" />
                    <path class="path-soft" d="M 1320 0 L 1320 210 L 1680 210" opacity="0.35" />
                    <path class="path-soft" d="M 0 490 L 690 490 L 810 620 L 1060 620" opacity="0.4" />

                    <g class="hud-boxes" fill="rgba(170, 24, 94, 0.6)">
                        <rect x="430" y="120" width="30" height="35" />
                        <rect x="430" y="170" width="30" height="35" />
                        <rect x="430" y="220" width="30" height="35" />
                        <rect x="430" y="270" width="30" height="35" />
                        <rect x="430" y="320" width="30" height="35" />

            <div class="streak pink" style="left: 2%; top: 9%; width: 220px; animation-delay: 0.2s"></div>
            <div class="streak pink" style="left: 37%; top: 36%; width: 280px; animation-delay: 1.3s"></div>
            <div class="streak pink" style="left: 48%; top: 63%; width: 240px; animation-delay: 2.4s"></div>
            <div class="streak pink" style="left: 58%; top: 82%; width: 260px; animation-delay: 0.8s"></div>
            <div class="streak blue" style="left: 74%; top: 90%; width: 210px; animation-delay: 1.8s"></div>
            <div class="streak pink" style="left: 78%; top: 52%; width: 300px; animation-delay: 3s"></div>

            <div class="logo-card">
                <div class="logo-frame">
                    <span class="corner-node n1"></span>
                    <span class="corner-node n2"></span>
                    <span class="corner-node n3"></span>
                    <span class="corner-node n4"></span>
                    <span class="corner-node n5"></span>
                    <span class="corner-node n6"></span>
                    <div class="logo-text">
                        <span class="line1"></span>
                        <span class="line2"></span>
                    </div>
                </div>
            </div>

            <div class="right-stack">
                <div class="smiley-slideshow" id="smileySlideshow">
                    <div class="ss-title">Power Smilies</div>
                    <div class="ss-stage">
                        <img class="ss-img ss-fx-in" id="ssImg" src="" alt="" />
                        <div class="ss-label ss-fx-in" id="ssLabel"></div>
                    </div>
                    <div class="ss-dots" id="ssDots"></div>
                </div>

                <div class="release-power-display" id="releasePowerDisplay">
                    <div class="release-title">Latest Released Power</div>
                    <div class="release-body loading" id="releasePowerBody">
                        Loading latest release...
                    </div>
                </div>

                <div class="brand-tag">
                    <span class="brand-small"></span>
                    <span class="brand-arrow"></span>
                    <span class="brand-large"></span>
                </div>

                <div class="edit-note tip-fade-in" id="rotatingTip">
                    Buy a bot: Do the command !buyabot
                </div>
            </div>
        </div>

        <script>
            function setTheme({ bg, bgDark, brand, brand2, blue, pink } = {}) {
                const root = document.documentElement;
                if (bg) root.style.setProperty("--bg-main", bg);
                if (bgDark) root.style.setProperty("--bg-dark", bgDark);
                if (brand) root.style.setProperty("--brand-main", brand);
                if (brand2) root.style.setProperty("--brand-accent", brand2);
                if (blue) {
                    root.style.setProperty("--line-blue", blue);
                    root.style.setProperty("--glow-blue", blue);
                }
                if (pink) {
                    root.style.setProperty("--line-pink", pink);
                    root.style.setProperty("--glow-pink", pink);
                }
            }

            function setText({ left1, left2, small, large } = {}) {
                const root = document.documentElement;
                if (left1) root.style.setProperty("--left-logo-line-1", `'${left1}'`);
                if (left2) root.style.setProperty("--left-logo-line-2", `'${left2}'`);
                if (small) root.style.setProperty("--right-tag-small", `'${small}'`);
                if (large) root.style.setProperty("--right-tag-large", `'${large}'`);
            }

            window.setTheme = setTheme;
            window.setText = setText;

            const tips = [
                "Buy a bot: Do the command !buyabot",
                "Need help? You can do !help if no staff are available.",
                "Customize your bot settings from the panel: https://pythbots.com",
                "Want to start your bot? !start and to stop your bot it's !kill",
                "Stay updated with the latest PythBots tools: https://pythbots.com",
            ];

            let currentTipIndex = 0;
            const tipElement = document.getElementById("rotatingTip");
            const tipIntervalMs = 30000;
            const fadeDurationMs = 350;

            function showTip(index) {
                if (!tipElement || !tips.length) return;
                tipElement.classList.remove("tip-fade-in");
                tipElement.classList.add("tip-fade-out");
                setTimeout(() => {
                    tipElement.textContent = tips[index];
                    tipElement.classList.remove("tip-fade-out");
                    tipElement.classList.add("tip-fade-in");
                }, fadeDurationMs);
            }

            function startTipRotation() {
                if (!tipElement || tips.length === 0) return;
                tipElement.textContent = tips[0];
                if (tips.length === 1) return;
                setInterval(() => {
                    currentTipIndex = (currentTipIndex + 1) % tips.length;
                    showTip(currentTipIndex);
                }, tipIntervalMs);
            }

            const RELEASE_API_URL = "https://api.xatblog.net/latest";
            const releasePowerDisplay = document.getElementById("releasePowerDisplay");
            const releasePowerBody = document.getElementById("releasePowerBody");
            const queryParams = new URLSearchParams(window.location.search);
            const showRelease = queryParams.has("release");

            function escapeHtml(value) {
                return String(value ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function getLatestPowerEntry(powers) {
                if (!Array.isArray(powers) || !powers.length) return null;
                const p = powers[0];
                return { id: p.id, power: p };
            }

            function getPowerImage(power) {
                return `https://gs.xat.com/a_(${encodeURIComponent(power.name)})_80`;
            }

            function getPowerStatus(power) {
                return power.status === "limited" ? "Limited" : "Available";
            }

            function getPowerStore(power) {
                return (power.prices && power.prices.store) || "N/A";
            }

            function renderReleaseLoading() {
                releasePowerBody.className = "release-body loading";
                releasePowerBody.textContent = "Loading latest release...";
            }

            function renderReleaseError(message) {
                releasePowerBody.className = "release-body error";
                releasePowerBody.textContent = message;
            }

            function renderReleasePower(id, power) {
                // kick off smiley slideshow with this power's smilies
                if (power.smilies && power.smilies.length) {
                    ssInit(power.smilies);
                }
                const desc =
                    (power.description && power.description.long) ||
                    (power.description && power.description.short) ||
                    "No description available.";

                releasePowerBody.className = "release-body";
                releasePowerBody.innerHTML = `
                    <div class="release-card">
                        <div class="release-image-wrap">
                            <img class="release-image" src="${getPowerImage(power)}" alt="${escapeHtml(power.name)}" onerror="this.style.opacity='0.25'" />
                        </div>
                        <div class="release-info">
                            <h3 class="release-name">${escapeHtml(power.name)}</h3>
                            <div class="release-row">
                                <span class="release-label">Price In Store</span>
                                <span class="release-value">${escapeHtml(getPowerStore(power))}</span>
                            </div>
                            <div class="release-row">
                                <span class="release-label">Status</span>
                                <span class="release-value">${escapeHtml(getPowerStatus(power))}</span>
                            </div>
                            <div class="release-row">
                                <span class="release-label">Power ID</span>
                                <span class="release-value">${escapeHtml(id)}</span>
                            </div>
                        </div>
                    </div>
                    <div class="release-desc">${escapeHtml(desc)}</div>
                `;
            }

            async function loadReleasedPower() {
                renderReleaseLoading();
                try {
                    const res = await fetch(RELEASE_API_URL, {
                        method: "GET",
                        headers: { Accept: "application/json" },
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if (!data || !Array.isArray(data.powers)) throw new Error("Invalid API response");

                    const latest = getLatestPowerEntry(data.powers);
                    if (!latest || !latest.power) throw new Error("No released powers found");

                    renderReleasePower(latest.id, latest.power);
                } catch (error) {
                    renderReleaseError(`Could not load released power: ${error.message}`);
                }
            }

            if (showRelease) {
                releasePowerDisplay.classList.add("show");
                loadReleasedPower();
            }


            // ── Smiley Slideshow ─────────────────────────────────────────
            const ssPanel  = document.getElementById("smileySlideshow");
            const ssImg    = document.getElementById("ssImg");
            const ssLabel  = document.getElementById("ssLabel");
            const ssDotsEl = document.getElementById("ssDots");

            let ssSmilies  = [];
            let ssCurrent  = 0;
            let ssTimer    = null;
            let ssRunning  = false;

            function ssSetDots(count, active) {
                ssDotsEl.innerHTML = "";
                for (let i = 0; i < count; i++) {
                    const d = document.createElement("span");
                    d.className = "ss-dot" + (i === active ? " active" : "");
                    ssDotsEl.appendChild(d);
                }
            }

            function ssShowSlide(index, cb) {
                ssImg.classList.remove("ss-fx-in");
                ssImg.classList.add("ss-fx-out");
                ssLabel.classList.remove("ss-fx-in");
                ssLabel.classList.add("ss-fx-out");

                setTimeout(() => {
                    const name = ssSmilies[index];
                    ssImg.src = "https://gs.xat.com/a_(" + encodeURIComponent(name) + ")_80";
                    ssImg.alt = name;
                    ssLabel.textContent = "(" + name + ")";
                    ssSetDots(ssSmilies.length, index);

                    ssImg.classList.remove("ss-fx-out");
                    ssImg.classList.add("ss-fx-in");
                    ssLabel.classList.remove("ss-fx-out");
                    ssLabel.classList.add("ss-fx-in");

                    if (cb) setTimeout(cb, 350);
                }, 320);
            }

            function ssRunShow() {
                if (!ssSmilies.length || ssRunning) return;
                ssRunning = true;
                ssCurrent = 0;

                ssPanel.classList.add("ss-show");
                ssShowSlide(ssCurrent);

                function nextSlide() {
                    ssCurrent++;
                    if (ssCurrent < ssSmilies.length) {
                        ssTimer = setTimeout(() => ssShowSlide(ssCurrent, nextSlide), 1800);
                    } else {
                        // all done — wait then slide back down
                        ssTimer = setTimeout(() => {
                            ssPanel.classList.remove("ss-show");
                            setTimeout(() => {
                                ssRunning = false;
                                ssTimer = setTimeout(ssRunShow, 60000);
                            }, 550);
                        }, 2000);
                    }
                }

                ssTimer = setTimeout(nextSlide, 1800);
            }

            function ssInit(smilies) {
                if (!smilies || !smilies.length) return;
                clearTimeout(ssTimer);
                ssRunning = false;
                ssSmilies = smilies;
                ssTimer = setTimeout(ssRunShow, 60000);
            }

            startTipRotation();
        </script>
    </body>
</html>
