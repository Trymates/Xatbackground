<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PythBots - Saint Patrick's Day</title>
        <style>
            :root {
                --bg-main: #03140b;
                --bg-dark: #010a05;
                --bg-mid: #062514;

                --emerald-1: #63ff9f;
                --emerald-2: #2dff78;
                --emerald-3: #11c960;
                --emerald-soft: rgba(93, 255, 158, 0.16);

                --gold-1: #ffe58e;
                --gold-2: #ffd34d;
                --gold-3: #c89400;
                --gold-soft: rgba(255, 214, 82, 0.16);

                --white-soft: rgba(247, 255, 249, 0.94);
                --white-dim: rgba(220, 255, 228, 0.7);

                --glass: rgba(7, 28, 16, 0.72);
                --glass-strong: rgba(7, 24, 14, 0.86);
                --glass-border: rgba(164, 255, 184, 0.14);

                --brand-main: #8dff8d;
                --brand-outline: rgba(120, 255, 160, 0.5);

                --logo-border: rgba(228, 255, 235, 0.92);
                --logo-text: #f5fff6;

                --scanline: rgba(255, 255, 255, 0.02);

                --left-logo-line-1: "PYTH";
                --left-logo-line-2: "BOTS";
                --right-tag-small: "XAT";
                --right-tag-large: "PYTHBOTS";
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background:
                    radial-gradient(circle at 18% 22%, rgba(96, 255, 158, 0.12), transparent 26%),
                    radial-gradient(circle at 82% 18%, rgba(255, 218, 103, 0.1), transparent 22%),
                    radial-gradient(circle at 50% 60%, rgba(40, 181, 95, 0.08), transparent 40%),
                    linear-gradient(135deg, var(--bg-main), var(--bg-dark));
                font-family: Arial, Helvetica, sans-serif;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: repeating-linear-gradient(
                    to bottom,
                    transparent 0px,
                    transparent 4px,
                    var(--scanline) 5px
                );
                pointer-events: none;
                opacity: 0.28;
                mix-blend-mode: screen;
                z-index: 0;
            }

            .scene {
                position: relative;
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                background:
                    radial-gradient(circle at 50% 50%, rgba(103, 255, 150, 0.05), transparent 28%),
                    linear-gradient(135deg, #03150c 0%, #062012 55%, #010a05 100%);
            }

            .aurora {
                position: absolute;
                inset: -10%;
                pointer-events: none;
                z-index: 1;
                filter: blur(35px);
                opacity: 0.85;
            }

            .aurora span {
                position: absolute;
                border-radius: 50%;
                mix-blend-mode: screen;
                animation: driftBlob linear infinite;
            }

            .aurora .a1 {
                width: 38vw;
                height: 38vw;
                left: -8%;
                top: 6%;
                background: radial-gradient(circle, rgba(94, 255, 159, 0.22), transparent 70%);
                animation-duration: 18s;
            }

            .aurora .a2 {
                width: 28vw;
                height: 28vw;
                right: 4%;
                top: 10%;
                background: radial-gradient(circle, rgba(255, 220, 112, 0.16), transparent 72%);
                animation-duration: 22s;
            }

            .aurora .a3 {
                width: 42vw;
                height: 42vw;
                left: 24%;
                bottom: -12%;
                background: radial-gradient(circle, rgba(61, 221, 117, 0.16), transparent 72%);
                animation-duration: 25s;
            }

            .center-art {
                position: absolute;
                inset: 0;
                z-index: 2;
                pointer-events: none;
            }

            .center-art svg {
                width: 100%;
                height: 100%;
                display: block;
            }

            .energy-ring {
                fill: none;
                stroke-linecap: round;
                transform-origin: center;
            }

            .ring-1 {
                stroke: rgba(114, 255, 156, 0.95);
                stroke-width: 2.5;
                stroke-dasharray: 18 16;
                filter: drop-shadow(0 0 12px rgba(109, 255, 152, 0.38));
                animation: spinSlow 18s linear infinite;
            }

            .ring-2 {
                stroke: rgba(255, 215, 96, 0.82);
                stroke-width: 2;
                stroke-dasharray: 8 18;
                filter: drop-shadow(0 0 10px rgba(255, 215, 96, 0.24));
                animation: spinReverse 14s linear infinite;
            }

            .ring-3 {
                stroke: rgba(140, 255, 187, 0.45);
                stroke-width: 1.5;
                stroke-dasharray: 4 12;
                animation: spinSlow 26s linear infinite;
            }

            .wave-path {
                fill: none;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            .wave-green {
                stroke: rgba(106, 255, 152, 0.52);
                stroke-width: 2;
                filter: drop-shadow(0 0 10px rgba(90, 255, 145, 0.16));
                animation: dashFlow 12s linear infinite;
                stroke-dasharray: 14 14;
            }

            .wave-gold {
                stroke: rgba(255, 214, 82, 0.32);
                stroke-width: 1.6;
                animation: dashFlowReverse 10s linear infinite;
                stroke-dasharray: 6 12;
            }

            .core-glow {
                fill: url(#coreGlow);
                animation: corePulse 4.8s ease-in-out infinite;
            }

            .core-outline {
                fill: none;
                stroke: rgba(235, 255, 239, 0.75);
                stroke-width: 1.4;
            }

            .particle {
                animation: particleBlink 2.6s ease-in-out infinite;
            }

            .particle.gold {
                fill: rgba(255, 220, 124, 0.92);
            }

            .particle.green {
                fill: rgba(132, 255, 150, 0.95);
            }

            .halo-line {
                fill: none;
                stroke: rgba(255, 255, 255, 0.06);
                stroke-width: 1;
            }

            .floating-clovers {
                position: absolute;
                inset: 0;
                z-index: 3;
                pointer-events: none;
                overflow: hidden;
            }

            .clover {
                position: absolute;
                font-size: clamp(18px, 2vw, 30px);
                color: rgba(180, 255, 112, 0.95);
                text-shadow:
                    0 0 14px rgba(115, 255, 148, 0.45),
                    0 0 26px rgba(255, 214, 82, 0.08);
                opacity: 0.82;
                animation: floatClover linear infinite;
            }

            .sparkles {
                position: absolute;
                inset: 0;
                z-index: 2;
                pointer-events: none;
            }

            .sparkles span {
                position: absolute;
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: radial-gradient(circle, #fff6c7 0%, #ffd95d 45%, transparent 70%);
                box-shadow: 0 0 12px rgba(255, 219, 103, 0.3);
                animation: sparkleTwinkle ease-in-out infinite;
            }

            .logo-card {
                position: absolute;
                left: 6.2%;
                top: 46%;
                transform: translateY(-50%);
                width: 270px;
                height: 205px;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 8;
                animation: floatBox 5.5s ease-in-out infinite;
            }

            .logo-frame,
            .logo-frame::before,
            .logo-frame::after {
                clip-path: polygon(
                    12% 0%,
                    88% 0%,
                    100% 14%,
                    100% 86%,
                    88% 100%,
                    12% 100%,
                    0% 86%,
                    0% 14%
                );
            }

            .logo-frame {
                position: relative;
                width: 100%;
                height: 100%;
                border: 4px solid var(--logo-border);
                background:
                    radial-gradient(circle at top left, rgba(102, 255, 147, 0.16), transparent 44%),
                    linear-gradient(180deg, rgba(39, 124, 66, 0.22), rgba(255, 255, 255, 0.03));
                box-shadow:
                    0 0 28px rgba(91, 255, 144, 0.2),
                    0 0 52px rgba(255, 214, 82, 0.08),
                    inset 0 0 28px rgba(255, 255, 255, 0.04);
                backdrop-filter: blur(10px);
            }

            .logo-frame::before {
                content: "";
                position: absolute;
                inset: 10px;
                border: 2px solid rgba(232, 255, 239, 0.58);
                opacity: 0.88;
            }

            .logo-frame::after {
                content: "";
                position: absolute;
                inset: -13px;
                border: 2px solid rgba(255, 220, 128, 0.65);
                opacity: 0.9;
                box-shadow: 0 0 24px rgba(255, 214, 82, 0.16);
            }

            .corner-node {
                position: absolute;
                width: 11px;
                height: 11px;
                background: linear-gradient(180deg, #f4ffbd, #ffffff);
                box-shadow:
                    0 0 10px rgba(255, 255, 255, 0.82),
                    0 0 18px rgba(149, 255, 185, 0.65);
                z-index: 2;
            }

            .n1 {
                top: -6px;
                left: 28px;
            }
            .n2 {
                top: -6px;
                left: 50px;
            }
            .n3 {
                top: -6px;
                left: 72px;
            }
            .n4 {
                right: -6px;
                bottom: 22px;
            }
            .n5 {
                right: 18px;
                bottom: -6px;
            }
            .n6 {
                right: 40px;
                bottom: -6px;
            }

            .logo-text {
                position: absolute;
                inset: 0;
                z-index: 3;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                color: var(--logo-text);
                font-weight: 900;
                line-height: 0.9;
                letter-spacing: 2px;
                text-shadow:
                    0 0 8px rgba(255, 255, 255, 0.72),
                    0 0 20px rgba(118, 255, 160, 0.65),
                    0 0 34px rgba(255, 216, 90, 0.12);
                user-select: text;
            }

            .logo-text .line1,
            .logo-text .line2 {
                display: block;
                font-size: 4rem;
            }

            .logo-text .line1::before {
                content: var(--left-logo-line-1);
            }

            .logo-text .line2::before {
                content: var(--left-logo-line-2);
            }

            .logo-card::after {
                content: "☘";
                position: absolute;
                right: -18px;
                top: -16px;
                font-size: 42px;
                color: #baff6e;
                text-shadow:
                    0 0 12px rgba(147, 255, 109, 0.75),
                    0 0 24px rgba(255, 213, 90, 0.18);
                animation: cloverSpin 8s linear infinite;
                opacity: 0.92;
            }

            .right-stack {
                position: absolute;
                top: clamp(180px, 26vh, 300px);
                right: clamp(16px, 2.8vw, 56px);
                width: clamp(230px, 18vw, 340px);
                max-width: 340px;
                z-index: 10;
                display: flex;
                flex-direction: column;
                gap: 14px;
                align-items: stretch;
            }

            .right-stack > * {
                width: 100%;
            }

            @media (max-width: 1510px) {
                .right-stack {
                    width: clamp(210px, 16vw, 290px);
                }
            }

            @media (max-width: 1400px) {
                .right-stack {
                    width: 244px;
                }

                .release-name {
                    font-size: 20px;
                }
            }

            @media (max-width: 1330px) {
                .right-stack {
                    display: none;
                }
            }

            .release-power-display {
                border-radius: 22px;
                padding: 16px;
                background:
                    radial-gradient(circle at top left, rgba(118, 255, 164, 0.08), transparent 40%),
                    linear-gradient(180deg, rgba(6, 36, 18, 0.9), rgba(4, 20, 10, 0.92));
                border: 1px solid var(--glass-border);
                box-shadow:
                    0 22px 50px rgba(0, 0, 0, 0.35),
                    0 0 22px rgba(110, 255, 149, 0.08),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(14px);
                color: var(--white-soft);
                opacity: 0;
                visibility: hidden;
                transform: translateY(10px) scale(0.98);
                transition:
                    opacity 0.22s ease,
                    transform 0.22s ease,
                    visibility 0.22s ease;
            }

            .release-power-display.show {
                opacity: 1;
                visibility: visible;
                transform: translateY(0) scale(1);
            }

            .release-title {
                font-size: 12px;
                font-weight: 800;
                letter-spacing: 1.2px;
                text-transform: uppercase;
                color: rgba(236, 255, 240, 0.95);
                margin-bottom: 12px;
            }

            .release-body.loading,
            .release-body.error {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100px;
                text-align: center;
                font-size: 13px;
                color: rgba(225, 255, 229, 0.8);
            }

            .release-card {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .release-image-wrap {
                width: 72px;
                height: 72px;
                border-radius: 18px;
                background: radial-gradient(circle at 35% 30%, rgba(255, 235, 160, 0.18), rgba(255, 255, 255, 0.03));
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid rgba(190, 255, 197, 0.12);
                flex: 0 0 72px;
                box-shadow: inset 0 0 18px rgba(125, 255, 149, 0.1);
            }

            .release-image {
                width: 50px;
                height: 50px;
                object-fit: contain;
                filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.35));
            }

            .release-info {
                min-width: 0;
                flex: 1;
            }

            .release-name {
                font-size: 24px;
                font-weight: 800;
                line-height: 0.95;
                color: #f4fff6;
                margin: 0 0 8px;
                text-shadow: 0 0 14px rgba(165, 255, 181, 0.15);
                word-break: break-word;
            }

            .release-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                padding: 7px 0;
                border-top: 1px solid rgba(182, 255, 191, 0.08);
                font-size: 12px;
            }

            .release-row:first-of-type {
                border-top: 0;
            }

            .release-label {
                color: rgba(210, 255, 218, 0.68);
            }

            .release-value {
                color: #f5fff7;
                font-weight: 700;
                text-align: right;
                white-space: nowrap;
            }

            .release-desc {
                margin-top: 10px;
                padding-top: 10px;
                border-top: 1px solid rgba(182, 255, 191, 0.08);
                font-size: 12px;
                line-height: 1.45;
                color: rgba(225, 255, 229, 0.77);
            }

            .brand-tag {
                position: relative;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                align-self: center;
                gap: 12px;
                padding: 10px 18px;
                min-height: 42px;
                border: 1.5px solid var(--brand-outline);
                border-radius: 999px;
                background:
                    radial-gradient(circle at top left, rgba(255, 227, 130, 0.12), transparent 40%),
                    linear-gradient(90deg, rgba(7, 35, 18, 0.55), rgba(124, 255, 146, 0.05));
                box-shadow:
                    0 0 18px rgba(123, 255, 164, 0.15),
                    0 0 20px rgba(255, 214, 82, 0.06),
                    inset 0 0 18px rgba(255, 224, 120, 0.04);
                z-index: 5;
                animation: brandPulse 3.2s ease-in-out infinite;
            }

            .brand-small,
            .brand-large {
                color: var(--brand-main);
                font-weight: 900;
                line-height: 1;
                letter-spacing: 1px;
                text-shadow: 0 0 12px rgba(126, 255, 145, 0.35);
                user-select: text;
                white-space: nowrap;
            }

            .brand-small {
                font-size: 1rem;
            }

            .brand-large {
                font-size: 1.2rem;
            }

            .brand-small::before {
                content: var(--right-tag-small);
            }

            .brand-large::before {
                content: var(--right-tag-large);
            }

            .brand-arrow {
                position: relative;
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: radial-gradient(circle at 30% 30%, #ffe48f, #d6a70b);
                box-shadow:
                    0 0 18px rgba(255, 214, 82, 0.42),
                    inset 0 0 10px rgba(255, 255, 255, 0.18);
                flex: 0 0 32px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .brand-arrow::before {
                content: "";
                width: 8px;
                height: 8px;
                border-right: 4px solid white;
                border-bottom: 4px solid white;
                transform: rotate(-45deg);
            }

            .brand-tag::after {
                content: "☘";
                position: absolute;
                right: 8px;
                top: -8px;
                font-size: 14px;
                color: #beff7b;
                opacity: 0.95;
            }

            .edit-note {
                position: relative;
                z-index: 10;
                padding: 12px 14px;
                border-radius: 16px;
                background:
                    radial-gradient(circle at top left, rgba(129, 255, 156, 0.08), transparent 42%),
                    rgba(5, 25, 13, 0.82);
                border: 1px solid rgba(169, 255, 183, 0.14);
                color: rgba(242, 255, 246, 0.92);
                font-size: 12px;
                letter-spacing: 0.3px;
                backdrop-filter: blur(8px);
                transition:
                    opacity 0.35s ease,
                    transform 0.35s ease;
                width: 100%;
                line-height: 1.5;
                overflow-wrap: anywhere;
                box-shadow:
                    0 18px 34px rgba(0, 0, 0, 0.28),
                    inset 0 0 18px rgba(129, 255, 156, 0.04);
            }

            .edit-note::before {
                content: "☘";
                margin-right: 8px;
                color: #bbff71;
                text-shadow: 0 0 12px rgba(164, 255, 122, 0.55);
            }

            .edit-note.tip-fade-out {
                opacity: 0;
                transform: translateY(6px);
            }

            .edit-note.tip-fade-in {
                opacity: 1;
                transform: translateY(0);
            }

            @keyframes floatBox {
                0%,
                100% {
                    transform: translateY(-50%) translateX(0);
                }
                50% {
                    transform: translateY(calc(-50% - 8px)) translateX(2px);
                }
            }

            @keyframes brandPulse {
                0%,
                100% {
                    box-shadow:
                        0 0 14px rgba(123, 255, 164, 0.15),
                        inset 0 0 18px rgba(255, 224, 120, 0.04);
                }
                50% {
                    box-shadow:
                        0 0 22px rgba(123, 255, 164, 0.24),
                        0 0 28px rgba(255, 214, 82, 0.08),
                        inset 0 0 24px rgba(255, 224, 120, 0.08);
                }
            }

            @keyframes driftBlob {
                0% {
                    transform: translate3d(0, 0, 0) scale(1);
                }
                50% {
                    transform: translate3d(2vw, -1.5vw, 0) scale(1.08);
                }
                100% {
                    transform: translate3d(0, 0, 0) scale(1);
                }
            }

            @keyframes spinSlow {
                from {
                    transform: rotate(0deg);
                    transform-origin: 50% 50%;
                }
                to {
                    transform: rotate(360deg);
                    transform-origin: 50% 50%;
                }
            }

            @keyframes spinReverse {
                from {
                    transform: rotate(360deg);
                    transform-origin: 50% 50%;
                }
                to {
                    transform: rotate(0deg);
                    transform-origin: 50% 50%;
                }
            }

            @keyframes dashFlow {
                from {
                    stroke-dashoffset: 0;
                }
                to {
                    stroke-dashoffset: -160;
                }
            }

            @keyframes dashFlowReverse {
                from {
                    stroke-dashoffset: 0;
                }
                to {
                    stroke-dashoffset: 140;
                }
            }

            @keyframes corePulse {
                0%,
                100% {
                    opacity: 0.82;
                    transform: scale(1);
                    transform-origin: center;
                }
                50% {
                    opacity: 1;
                    transform: scale(1.04);
                    transform-origin: center;
                }
            }

            @keyframes particleBlink {
                0%,
                100% {
                    opacity: 0.35;
                }
                50% {
                    opacity: 1;
                }
            }

            @keyframes sparkleTwinkle {
                0%,
                100% {
                    transform: scale(0.7);
                    opacity: 0.35;
                }
                50% {
                    transform: scale(1.25);
                    opacity: 1;
                }
            }

            @keyframes floatClover {
                0% {
                    transform: translateY(110vh) rotate(0deg) scale(0.9);
                    opacity: 0;
                }
                10% {
                    opacity: 0.82;
                }
                100% {
                    transform: translateY(-16vh) rotate(240deg) scale(1.15);
                    opacity: 0;
                }
            }

            @keyframes cloverSpin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            @media (max-width: 900px) {
                .logo-card {
                    width: 210px;
                    height: 158px;
                }

                .logo-text .line1,
                .logo-text .line2 {
                    font-size: 3.2rem;
                }
            }

            @media (max-width: 720px) {
                .logo-card {
                    left: 50%;
                    top: 31%;
                    transform: translate(-50%, -50%);
                    width: 185px;
                    height: 138px;
                }

                .logo-text .line1,
                .logo-text .line2 {
                    font-size: 2.8rem;
                }

                .right-stack {
                    display: none;
                }

                @keyframes floatBox {
                    0%,
                    100% {
                        transform: translate(-50%, -50%) translateX(0);
                    }
                    50% {
                        transform: translate(-50%, calc(-50% - 8px)) translateX(2px);
                    }
                }
            }
        </style>
    </head>
    <body>
        <div class="scene">
            <div class="aurora">
                <span class="a1"></span>
                <span class="a2"></span>
                <span class="a3"></span>
            </div>

            <div class="sparkles" aria-hidden="true">
                <span style="left: 12%; top: 18%; animation-duration: 2.2s;"></span>
                <span style="left: 22%; top: 72%; animation-duration: 3s;"></span>
                <span style="left: 34%; top: 28%; animation-duration: 2.7s;"></span>
                <span style="left: 47%; top: 16%; animation-duration: 2.4s;"></span>
                <span style="left: 58%; top: 74%; animation-duration: 3.1s;"></span>
                <span style="left: 66%; top: 24%; animation-duration: 2.3s;"></span>
                <span style="left: 78%; top: 46%; animation-duration: 2.8s;"></span>
                <span style="left: 86%; top: 18%; animation-duration: 3.2s;"></span>
                <span style="left: 91%; top: 68%; animation-duration: 2.5s;"></span>
            </div>

            <div class="floating-clovers" aria-hidden="true">
                <span class="clover" style="left: 7%; animation-duration: 16s; animation-delay: -4s;">☘</span>
                <span class="clover" style="left: 17%; animation-duration: 20s; animation-delay: -9s; font-size: 24px;">☘</span>
                <span class="clover" style="left: 31%; animation-duration: 15s; animation-delay: -2s;">☘</span>
                <span class="clover" style="left: 46%; animation-duration: 19s; animation-delay: -11s; font-size: 20px;">☘</span>
                <span class="clover" style="left: 59%; animation-duration: 21s; animation-delay: -7s;">☘</span>
                <span class="clover" style="left: 71%; animation-duration: 14s; animation-delay: -1s; font-size: 28px;">☘</span>
                <span class="clover" style="left: 82%; animation-duration: 18s; animation-delay: -13s;">☘</span>
                <span class="clover" style="left: 92%; animation-duration: 22s; animation-delay: -6s; font-size: 22px;">☘</span>
            </div>

            <div class="center-art">
                <svg viewBox="0 0 1920 1080" preserveAspectRatio="none" aria-hidden="true">
                    <defs>
                        <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="rgba(255,236,166,0.95)" />
                            <stop offset="18%" stop-color="rgba(140,255,176,0.95)" />
                            <stop offset="48%" stop-color="rgba(56,215,112,0.5)" />
                            <stop offset="100%" stop-color="rgba(56,215,112,0)" />
                        </radialGradient>
                    </defs>

                    <path class="wave-path wave-green" d="M 0 615 C 240 530, 520 700, 780 615 S 1280 530, 1920 618" />
                    <path class="wave-path wave-gold" d="M 0 665 C 250 610, 520 760, 820 675 S 1290 598, 1920 660" />
                    <path class="wave-path wave-green" d="M 0 475 C 240 410, 520 560, 780 490 S 1280 420, 1920 500" />
                    <path class="wave-path wave-gold" d="M 0 385 C 240 350, 520 430, 790 390 S 1285 330, 1920 395" />

                    <ellipse class="halo-line" cx="960" cy="540" rx="330" ry="130" />
                    <ellipse class="halo-line" cx="960" cy="540" rx="270" ry="92" />
                    <ellipse class="halo-line" cx="960" cy="540" rx="200" ry="62" />

                    <g transform="translate(960 540)">
                        <ellipse class="energy-ring ring-3" cx="0" cy="0" rx="255" ry="118" />
                        <ellipse class="energy-ring ring-2" cx="0" cy="0" rx="210" ry="88" />
                        <ellipse class="energy-ring ring-1" cx="0" cy="0" rx="165" ry="62" />

                        <circle class="core-glow" cx="0" cy="0" r="120" />
                        <circle class="core-outline" cx="0" cy="0" r="76" />
                        <circle class="core-outline" cx="0" cy="0" r="44" opacity="0.75" />

                        <circle class="particle green" cx="-230" cy="-10" r="5" />
                        <circle class="particle green" cx="220" cy="18" r="4" style="animation-delay: .6s;" />
                        <circle class="particle gold" cx="-180" cy="55" r="4" style="animation-delay: .3s;" />
                        <circle class="particle gold" cx="185" cy="-52" r="5" style="animation-delay: .9s;" />
                        <circle class="particle green" cx="0" cy="-110" r="3.5" style="animation-delay: 1.2s;" />
                        <circle class="particle gold" cx="0" cy="116" r="3.5" style="animation-delay: 1.5s;" />
                        <circle class="particle green" cx="-92" cy="-74" r="3" style="animation-delay: .4s;" />
                        <circle class="particle gold" cx="104" cy="72" r="3" style="animation-delay: 1.1s;" />
                    </g>
                </svg>
            </div>

            <div class="logo-card">
                <div class="logo-frame">
                    <span class="corner-node n1"></span>
                    <span class="corner-node n2"></span>
                    <span class="corner-node n3"></span>
                    <span class="corner-node n4"></span>
                    <span class="corner-node n5"></span>
                    <span class="corner-node n6"></span>
                    <div class="logo-text">
                        <span class="line1"></span>
                        <span class="line2"></span>
                    </div>
                </div>
            </div>

            <div class="right-stack">
                <div class="release-power-display" id="releasePowerDisplay">
                    <div class="release-title">Latest Released Power</div>
                    <div class="release-body loading" id="releasePowerBody">
                        Loading latest release...
                    </div>
                </div>

                <div class="brand-tag">
                    <span class="brand-small"></span>
                    <span class="brand-arrow"></span>
                    <span class="brand-large"></span>
                </div>

                <div class="edit-note tip-fade-in" id="rotatingTip">
                    Grab some luck and buy a bot with !buyabot
                </div>
            </div>
        </div>

        <script>
            function setTheme({ bg, bgDark, brand, green, gold } = {}) {
                const root = document.documentElement;
                if (bg) root.style.setProperty("--bg-main", bg);
                if (bgDark) root.style.setProperty("--bg-dark", bgDark);
                if (brand) root.style.setProperty("--brand-main", brand);
                if (green) root.style.setProperty("--emerald-1", green);
                if (gold) root.style.setProperty("--gold-1", gold);
            }

            function setText({ left1, left2, small, large } = {}) {
                const root = document.documentElement;
                if (left1) root.style.setProperty("--left-logo-line-1", `'${left1}'`);
                if (left2) root.style.setProperty("--left-logo-line-2", `'${left2}'`);
                if (small) root.style.setProperty("--right-tag-small", `'${small}'`);
                if (large) root.style.setProperty("--right-tag-large", `'${large}'`);
            }

            window.setTheme = setTheme;
            window.setText = setText;

            const tips = [
                "Grab some luck and buy a bot with !buyabot",
                "Need help? Do !help if no staff are around.",
                "Customize your pyth bot settings at https://pythbots.com",
                "Start your bot with !start and stop it with !kill",
                "Stay updated with the latest PythBots tools at https://pythbots.com",
            ];

            let currentTipIndex = 0;
            const tipElement = document.getElementById("rotatingTip");
            const tipIntervalMs = 30000;
            const fadeDurationMs = 350;

            function showTip(index) {
                if (!tipElement || !tips.length) return;

                tipElement.classList.remove("tip-fade-in");
                tipElement.classList.add("tip-fade-out");

                setTimeout(() => {
                    tipElement.innerHTML = tips[index];
                    tipElement.classList.remove("tip-fade-out");
                    tipElement.classList.add("tip-fade-in");
                }, fadeDurationMs);
            }

            function startTipRotation() {
                if (!tipElement || tips.length === 0) return;
                tipElement.innerHTML = tips[0];
                if (tips.length === 1) return;

                setInterval(() => {
                    currentTipIndex = (currentTipIndex + 1) % tips.length;
                    showTip(currentTipIndex);
                }, tipIntervalMs);
            }

            const RELEASE_API_URL =
                "https://tradexat.com/modcp/api.php?action=powers&released=1&desc=1";
            const releasePowerDisplay = document.getElementById("releasePowerDisplay");
            const releasePowerBody = document.getElementById("releasePowerBody");
            const queryParams = new URLSearchParams(window.location.search);
            const showRelease = queryParams.has("release");

            function escapeHtml(value) {
                return String(value ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function getLatestPowerEntry(powers) {
                const ids = Object.keys(powers || {})
                    .map(Number)
                    .filter(Number.isFinite)
                    .sort((a, b) => b - a);

                if (!ids.length) return null;
                const id = ids[0];
                return { id, power: powers[id] || powers[String(id)] };
            }

            function getPowerImage(power) {
                return `https://gs.xat.com/a_(${encodeURIComponent(power.name)})_80`;
            }

            function getPowerStatus(power) {
                return Number(power.limited) === 1 ? "Limited" : "Available";
            }

            function getPowerStore(power) {
                return power.store || "N/A";
            }

            function renderReleaseLoading() {
                releasePowerBody.className = "release-body loading";
                releasePowerBody.textContent = "Loading latest release...";
            }

            function renderReleaseError(message) {
                releasePowerBody.className = "release-body error";
                releasePowerBody.textContent = message;
            }

            function renderReleasePower(id, power) {
                const desc = power.descr || power.title || "No description available.";

                releasePowerBody.className = "release-body";
                releasePowerBody.innerHTML = `
                    <div class="release-card">
                        <div class="release-image-wrap">
                            <img class="release-image" src="${getPowerImage(power)}" alt="${escapeHtml(power.name)}" onerror="this.style.opacity='0.25'" />
                        </div>
                        <div class="release-info">
                            <h3 class="release-name">${escapeHtml(power.name)}</h3>
                            <div class="release-row">
                                <span class="release-label">Price In Store</span>
                                <span class="release-value">${escapeHtml(getPowerStore(power))}</span>
                            </div>
                            <div class="release-row">
                                <span class="release-label">Status</span>
                                <span class="release-value">${escapeHtml(getPowerStatus(power))}</span>
                            </div>
                            <div class="release-row">
                                <span class="release-label">Power ID</span>
                                <span class="release-value">${escapeHtml(id)}</span>
                            </div>
                        </div>
                    </div>
                    <div class="release-desc">${escapeHtml(desc)}</div>
                `;
            }

            async function loadReleasedPower() {
                renderReleaseLoading();

                try {
                    const res = await fetch(RELEASE_API_URL, {
                        method: "GET",
                        headers: { Accept: "application/json" },
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if (!data || !data.powers) throw new Error("Invalid API response");

                    const latest = getLatestPowerEntry(data.powers);
                    if (!latest || !latest.power) throw new Error("No released powers found");

                    renderReleasePower(latest.id, latest.power);
                } catch (error) {
                    renderReleaseError(`Could not load released power: ${error.message}`);
                }
            }

            if (showRelease) {
                releasePowerDisplay.classList.add("show");
                loadReleasedPower();
            }

            startTipRotation();
        </script>
    </body>
</html>
